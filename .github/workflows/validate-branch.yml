name: Validate branch
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - synchronize
      - opened

jobs:
  validate-gradle-build:
    uses: entur/abt-gha-public/.github/workflows/gradle-open-source-verify.yml@v1.12
    permissions:
      contents: read
    # no secrets necessary
    with:
      java-version: 25
